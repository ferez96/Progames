name: Docs Check

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs-check.yml"
  pull_request:
    branches:
      - master
    paths:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs-check.yml"

permissions:
  contents: read

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose "**/*.md"
          fail: true
