{{define "signup"}}
<section class="row justify-content-center align-items-center" style="min-height: 64vh;">
  <div class="col-md-6 col-lg-5">
    <div class="text-center mb-4">
      <div class="brand-icon">
        <i class="bi bi-lightning-charge-fill"></i>
      </div>
      <h1 class="h-display display-5 mb-1">Create account</h1>
      <p class="text-soft mb-0">Write a bot. Watch it fight. Improve.</p>
    </div>
    <div class="glass-card p-4">
      {{with .Error}}
      <div class="alert alert-danger py-2 d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>{{.}}
      </div>
      {{end}}
      <form method="post" action="/api/signup"
            hx-post="/api/signup" hx-target="#app" hx-swap="innerHTML" hx-disabled-elt="button"
            class="vstack gap-3">
        <div>
          <label for="name" class="form-label text-soft small mb-1">Name</label>
          <input id="name" class="form-control form-control-lg" name="name" type="text"
                 placeholder="Your name" autocomplete="name" required autofocus>
        </div>
        <div>
          <label for="email" class="form-label text-soft small mb-1">Email</label>
          <input id="email" class="form-control form-control-lg" name="email" type="email"
                 placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div>
          <label for="password" class="form-label text-soft small mb-1">Password</label>
          <div class="pwd-wrap">
            <input id="password" class="form-control form-control-lg" name="password" type="password"
                   placeholder="Choose a strong password" autocomplete="new-password" required>
            <button type="button" class="pwd-toggle" id="pwd-toggle-signup" aria-label="Show">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button class="btn btn-primary btn-lg mt-1" type="submit">
          <span class="htmx-indicator spinner-border spinner-border-sm me-2"></span>
          Get started <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
      <p class="mt-3 mb-0 small text-soft text-center">
        Already have an account? <a class="link-light" href="/login" hx-get="/login" hx-target="#app" hx-push-url="true">Sign in</a>
      </p>
    </div>
  </div>
</section>
<script>
(function () {
  const btn = document.getElementById('pwd-toggle-signup');
  if (!btn) return;
  const inp = document.getElementById('password');
  btn.addEventListener('click', function () {
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.querySelector('i').className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    btn.setAttribute('aria-label', show ? 'Hide' : 'Show');
  });
})();
</script>
{{end}}
