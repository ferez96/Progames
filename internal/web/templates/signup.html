{{define "signup"}}
<section class="row justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="col-md-6 col-lg-5">
    <div class="text-center mb-4">
      <p class="eyebrow mb-2">Get started</p>
      <h1 class="h-display display-5 mb-2">Create account</h1>
      <p class="text-soft mb-0">Start playing in the next minute.</p>
    </div>
    <div class="glass-card tilt p-4">
      {{with .Error}}<div class="alert alert-danger py-2">{{.}}</div>{{end}}
      <form method="post" action="/signup" hx-post="/signup" hx-target="#app" hx-swap="innerHTML" hx-disabled-elt="button" class="vstack gap-3">
        <input class="form-control form-control-lg" name="name" placeholder="name" required autofocus>
        <input class="form-control form-control-lg" name="email" type="email" placeholder="email" required>
        <input class="form-control form-control-lg" name="password" type="password" placeholder="password" required>
        <button class="btn btn-primary btn-lg" type="submit">
          <span class="htmx-indicator spinner-border spinner-border-sm me-2"></span>
          Create account
        </button>
      </form>
      <p class="mt-3 mb-0 small text-soft text-center">Already have account? <a class="link-light" href="/login" hx-get="/login" hx-target="#app" hx-push-url="true">Sign in</a></p>
    </div>
  </div>
</section>
{{end}}
