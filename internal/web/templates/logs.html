{{define "logs"}}
<section class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <p class="eyebrow mb-1">Match #{{.MatchID}}</p>
    <h1 class="h-display display-6 mb-0">Execution logs</h1>
  </div>
  <a class="btn btn-outline-light btn-sm" href="/matches/{{.MatchID}}"
     hx-get="/matches/{{.MatchID}}" hx-target="#app" hx-push-url="true">
    <i class="bi bi-arrow-left me-1"></i>Back to result
  </a>
</section>

<div class="glass-card p-4">
  {{if .HasLog}}
  <div class="log-viewer">
    <button class="btn btn-outline-light btn-sm log-copy-btn" id="log-copy-btn" aria-label="Copy log to clipboard">
      <i class="bi bi-clipboard me-1"></i>Copy
    </button>
    <pre id="log-pre" class="mb-0 log-pre font-monospace">{{.Content}}</pre>
  </div>
  {{else}}
  <div class="text-center py-5">
    <i class="bi bi-journal-x" style="font-size:2rem;color:rgba(230,231,238,.2);"></i>
    <p class="text-soft mt-2 mb-0">No execution log available for this match.</p>
  </div>
  {{end}}
</div>

{{if .HasLog}}
<script>
(function () {
  const pre = document.getElementById('log-pre');
  const copyBtn = document.getElementById('log-copy-btn');

  // Color log levels
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function colorLine(line) {
    const esc = escHtml(line);
    if (/\b(ERROR|FATAL|PANIC|error|fatal|panic)\b/.test(line)) return '<span class="ll-error">' + esc + '</span>';
    if (/\b(WARN|WARNING|warn|warning)\b/.test(line))           return '<span class="ll-warn">'  + esc + '</span>';
    if (/\b(INFO|info)\b/.test(line))                           return '<span class="ll-info">'  + esc + '</span>';
    if (/\b(DEBUG|TRACE|debug|trace)\b/.test(line))             return '<span class="ll-debug">' + esc + '</span>';
    return esc;
  }
  const raw = pre.textContent;
  pre.innerHTML = raw.split('\n').map(colorLine).join('\n');

  // Copy button
  if (copyBtn) {
    copyBtn.addEventListener('click', function () {
      navigator.clipboard?.writeText(raw).then(function () {
        copyBtn.innerHTML = '<i class="bi bi-clipboard-check me-1"></i>Copied';
        setTimeout(function () {
          copyBtn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy';
        }, 2000);
      });
    });
  }
})();
</script>
{{end}}
{{end}}
