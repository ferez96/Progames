{{define "logs"}}
<section class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <p class="eyebrow mb-1">Match #{{.MatchID}}</p>
    <h1 class="h-display display-6 mb-0">Execution logs</h1>
  </div>
  <a class="btn btn-outline-light btn-sm" href="/matches/{{.MatchID}}" hx-get="/matches/{{.MatchID}}" hx-target="#app" hx-push-url="true">Back to match</a>
</section>
<div class="glass-card p-4">
  <pre class="mb-0 p-3 rounded small" style="background: rgba(0,0,0,0.45); max-height: 70vh; overflow:auto;">{{.Content}}</pre>
</div>
{{end}}
