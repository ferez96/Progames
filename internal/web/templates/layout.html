{{define "layout"}}
<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · Progames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3/dist/svg.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <style>
    :root {
      --bg-base: #07080d;
      --accent-1: #6366f1;
      --accent-2: #ec4899;
      --accent-3: #22d3ee;
      --glass-bg: rgba(20, 22, 30, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-soft: #c7c9d4;
    }

    * { -webkit-font-smoothing: antialiased; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-base);
      color: #e6e7ee;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== Aurora / parallax background ===== */
    body::before, body::after {
      content: "";
      position: fixed;
      z-index: -2;
      filter: blur(120px);
      opacity: 0.55;
      pointer-events: none;
    }
    body::before {
      width: 720px; height: 720px;
      top: -200px; left: -150px;
      background: radial-gradient(circle, var(--accent-1), transparent 60%);
      animation: drift1 18s ease-in-out infinite alternate;
    }
    body::after {
      width: 600px; height: 600px;
      bottom: -220px; right: -150px;
      background: radial-gradient(circle, var(--accent-2), transparent 60%);
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .aurora-c {
      position: fixed;
      width: 520px; height: 520px;
      top: 32%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--accent-3), transparent 60%);
      filter: blur(120px);
      opacity: 0.35;
      z-index: -2;
      animation: drift3 26s ease-in-out infinite alternate;
      pointer-events: none;
      transition: transform 200ms ease-out;
    }
    @keyframes drift1 { from {transform: translate(0,0)} to {transform: translate(180px, 120px)} }
    @keyframes drift2 { from {transform: translate(0,0)} to {transform: translate(-160px, -100px)} }
    @keyframes drift3 { from {transform: translate(-50%, -50%) scale(1)} to {transform: translate(-40%, -55%) scale(1.2)} }

    /* ===== Topbar ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(0px);
      background: transparent;
      border-bottom: 1px solid transparent;
      transition: background 250ms ease, backdrop-filter 250ms ease, border-color 250ms ease;
    }
    .topbar.scrolled {
      backdrop-filter: saturate(160%) blur(14px);
      background: rgba(10, 12, 18, 0.55);
      border-bottom-color: rgba(255,255,255,0.06);
    }
    .brand {
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ===== Glass cards & 3D tilt ===== */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.7);
      transition: transform 250ms ease, box-shadow 250ms ease;
    }
    .glass-card:hover {
      box-shadow: 0 40px 100px -30px rgba(99, 102, 241, 0.35);
    }
    .tilt { transform-style: preserve-3d; will-change: transform; transition: transform 180ms ease; }

    /* ===== Buttons / inputs ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      box-shadow: 0 10px 30px -10px rgba(99,102,241,0.6);
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-outline-light { border-color: rgba(255,255,255,0.18); }
    .btn-outline-light:hover { background: rgba(255,255,255,0.06); color: #fff; }

    .form-control, .form-select {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.10);
      color: #e6e7ee;
    }
    .form-control::placeholder { color: rgba(230,231,238,0.5); }
    .form-control:focus, .form-select:focus {
      background: rgba(255,255,255,0.06);
      border-color: var(--accent-1);
      box-shadow: 0 0 0 0.25rem rgba(99,102,241,0.25);
      color: #fff;
    }

    /* ===== Typography ===== */
    .font-monospace, code, pre { font-family: 'JetBrains Mono', monospace; }
    .h-display { font-weight: 700; letter-spacing: -0.02em; }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      color: rgba(230,231,238,0.6);
    }
    .text-soft { color: var(--text-soft); }

    /* ===== HTMX swap transitions ===== */
    .htmx-swapping { opacity: 0; transform: translateY(8px); transition: opacity 180ms ease, transform 180ms ease; }
    .htmx-settling { opacity: 0; transform: translateY(8px); }
    .htmx-added    { animation: fadeIn 240ms ease forwards; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* Tables on dark glass */
    .table { color: #e6e7ee; }
    .table thead th { color: rgba(230,231,238,0.6); font-weight: 500; border-color: rgba(255,255,255,0.06); }
    .table > :not(caption) > * > * { border-color: rgba(255,255,255,0.06); }
    .table tbody tr { transition: background 120ms ease; }
    .table tbody tr:hover { background: rgba(255,255,255,0.03); }

    /* ===== Outcome hero ===== */
    .outcome-hero {
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    .outcome-hero .outcome-icon { font-size: 3rem; line-height: 1; margin-bottom: .75rem; }
    .outcome-hero .outcome-title { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .25rem; }
    .outcome-hero .outcome-sub { color: var(--text-soft); font-size: .95rem; }
    .outcome-win  { background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(99,102,241,.05)); border: 1px solid rgba(99,102,241,.3); }
    .outcome-loss { background: linear-gradient(135deg, rgba(239,68,68,.14), rgba(239,68,68,.03)); border: 1px solid rgba(239,68,68,.22); }
    .outcome-draw { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); }
    .outcome-failed { background: linear-gradient(135deg, rgba(245,158,11,.14), rgba(245,158,11,.03)); border: 1px solid rgba(245,158,11,.22); }
    .outcome-pending { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); }
    .outcome-win  .outcome-title { color: #818cf8; }
    .outcome-loss .outcome-title { color: #f87171; }
    .outcome-draw .outcome-title { color: #e6e7ee; }
    .outcome-failed .outcome-title { color: #fbbf24; }

    /* ===== Result badges ===== */
    .badge-win  { background: rgba(99,102,241,.22); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
    .badge-loss { background: rgba(239,68,68,.18); color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }
    .badge-draw { background: rgba(255,255,255,.08); color: #9ca3af; border: 1px solid rgba(255,255,255,.12); }
    .badge-failed { background: rgba(245,158,11,.18); color: #fcd34d; border: 1px solid rgba(245,158,11,.25); }
    .badge-blackwins { background: rgba(255,255,255,.08); color: #e6e7ee; border: 1px solid rgba(255,255,255,.18); }
    .badge-whitewins { background: rgba(255,255,255,.15); color: #e6e7ee; border: 1px solid rgba(255,255,255,.3); }

    /* ===== Editor chrome ===== */
    .editor-chrome {
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.08);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: .45rem 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: rgba(230,231,238,.45);
      user-select: none;
    }
    .editor-chrome .traffic { display: flex; gap: 5px; margin-right: .25rem; }
    .editor-chrome .traffic span { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .editor-chrome .t-red  { background: #ff5f57; }
    .editor-chrome .t-yel  { background: #febc2e; }
    .editor-chrome .t-grn  { background: #28c840; }
    .editor-chrome .tab { background: rgba(255,255,255,.07); border-radius: 6px; padding: .15rem .6rem; color: rgba(230,231,238,.7); }
    textarea.editor-body {
      border-radius: 0 0 12px 12px !important;
      border-top-color: transparent !important;
    }

    /* ===== Drop zone ===== */
    .drop-zone {
      border: 2px dashed rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease;
      position: relative;
      color: var(--text-soft);
    }
    .drop-zone:hover, .drop-zone.dz-over {
      border-color: var(--accent-1);
      background: rgba(99,102,241,.07);
      color: #e6e7ee;
    }
    .drop-zone.dz-chosen {
      border-color: rgba(99,102,241,.5);
      background: rgba(99,102,241,.1);
      color: #a5b4fc;
    }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone-inner { pointer-events: none; }

    /* ===== Kbd shortcut pill ===== */
    kbd {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 5px;
      padding: .1em .4em;
      font-size: .75em;
      font-family: inherit;
      color: var(--text-soft);
    }

    /* ===== Pulse for in-progress ===== */
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-3); animation: pulse-dot 1.6s ease-in-out infinite; margin-right: .35rem; }

    /* ===== Custom scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.22); }

    /* ===== Skip to content ===== */
    .skip-link {
      position: fixed; top: -100%; left: 1rem; z-index: 9999;
      background: var(--accent-1); color: #fff;
      padding: .4rem .9rem; border-radius: 0 0 8px 8px;
      font-size: .85rem; font-weight: 600;
      transition: top 120ms ease;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; color: #fff; }

    /* ===== Global loading bar ===== */
    #loading-bar {
      position: fixed; top: 0; left: 0; height: 2px; width: 0;
      z-index: 9998;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      opacity: 0;
      pointer-events: none;
      transition: width 300ms ease, opacity 250ms ease;
    }

    /* ===== Focus visible (accessibility) ===== */
    :focus-visible {
      outline: 2px solid var(--accent-1);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* ===== Toast notifications ===== */
    #toast-root { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 1080; display: flex; flex-direction: column; gap: .5rem; min-width: 260px; max-width: 360px; pointer-events: none; }
    .app-toast {
      display: flex; align-items: flex-start; gap: .65rem;
      padding: .75rem 1rem;
      background: rgba(20,22,30,.85);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 8px 32px -8px rgba(0,0,0,.7);
      color: #e6e7ee; font-size: .875rem;
      pointer-events: all;
      animation: toastIn 220ms ease forwards;
    }
    .app-toast.toast-out { animation: toastOut 200ms ease forwards; }
    .app-toast .toast-icon { flex-shrink: 0; font-size: 1.1rem; line-height: 1.4; }
    .app-toast.toast-success { border-color: rgba(34,211,238,.3); }
    .app-toast.toast-success .toast-icon { color: var(--accent-3); }
    .app-toast.toast-error { border-color: rgba(239,68,68,.3); }
    .app-toast.toast-error .toast-icon { color: #f87171; }
    .app-toast.toast-warn { border-color: rgba(245,158,11,.3); }
    .app-toast.toast-warn .toast-icon { color: #fbbf24; }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(24px); } }

    /* ===== Mobile navbar toggler ===== */
    .navbar-toggler { border-color: rgba(255,255,255,.18); }
    .navbar-toggler:focus { box-shadow: 0 0 0 .2rem rgba(99,102,241,.35); }
    .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(230,231,238,0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); }

    /* ===== Brand icon badge (auth pages) ===== */
    .brand-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; color: #fff;
      box-shadow: 0 8px 32px -8px rgba(99,102,241,.65);
      margin: 0 auto .75rem;
    }

    /* ===== Password toggle ===== */
    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute; top: 50%; right: .75rem; transform: translateY(-50%);
      background: transparent; border: none; padding: .2rem .3rem;
      color: rgba(230,231,238,.45); cursor: pointer; line-height: 1;
      transition: color 130ms ease;
    }
    .pwd-toggle:hover { color: #e6e7ee; }
    .pwd-wrap .form-control { padding-right: 2.6rem; }

    /* ===== Seek slider (game replay) ===== */
    input[type=range].seek-bar {
      flex: 1; min-width: 60px;
      accent-color: var(--accent-1);
      cursor: pointer;
      height: 4px;
    }

    /* ===== Recap stat boxes ===== */
    .recap-stat-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px;
      padding: .5rem .25rem;
    }
    .recap-panel { display: flex; flex-direction: column; gap: 1rem; }
    .recap-section-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .14em; color: rgba(230,231,238,.45); margin-bottom: .5rem; }
    .recap-inner { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 12px; padding: .85rem 1rem; }
    .recap-placeholder { border-style: dashed !important; opacity: .45; }

    /* ===== Moves drawer (bottom collapsed) ===== */
    .moves-drawer { margin-top: 1.5rem; }
    .moves-drawer > summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1rem;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      color: #e6e7ee;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: background 140ms ease, border-radius 140ms ease;
    }
    .moves-drawer > summary::-webkit-details-marker { display: none; }
    .moves-drawer > summary .drawer-chevron { margin-left: auto; transition: transform 200ms ease; }
    .moves-drawer[open] > summary {
      border-radius: 10px 10px 0 0;
      background: rgba(255,255,255,.06);
    }
    .moves-drawer[open] > summary .drawer-chevron { transform: rotate(180deg); }
    .moves-drawer .drawer-body {
      border: 1px solid rgba(255,255,255,.08);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }

    /* ===== Game sidebar tabs ===== */
    .game-tab {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      color: #e6e7ee;
      transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      cursor: pointer;
      text-align: left;
      width: 100%;
      padding: .65rem .85rem;
    }
    .game-tab:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.15); }
    .game-tab.active { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.42); box-shadow: 0 0 0 1px rgba(99,102,241,.2) inset; }
    .game-tab .gt-num { font-weight: 600; font-size: .875rem; }
    .game-tab .gt-meta { font-size: .78rem; color: var(--text-soft); margin-top: .2rem; }

    /* ===== Log viewer ===== */
    .log-viewer { position: relative; }
    .log-copy-btn {
      position: absolute; top: .65rem; right: .65rem;
      opacity: 0; transition: opacity 150ms ease;
    }
    .log-viewer:hover .log-copy-btn,
    .log-viewer:focus-within .log-copy-btn { opacity: 1; }
    .log-pre { background: rgba(0,0,0,.5); border-radius: 8px; padding: 1rem 1rem; max-height: 70vh; overflow: auto; line-height: 1.65; font-size: .8rem; }
    .ll-error { color: #f87171; }
    .ll-warn  { color: #fbbf24; }
    .ll-info  { color: #67e8f9; }
    .ll-debug { color: rgba(230,231,238,.4); }
  </style>
</head>
<body hx-boost="true">
  <a class="skip-link" href="#app">Skip to content</a>
  <div id="loading-bar" role="progressbar" aria-hidden="true"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="false"></div>
  <div class="aurora-c" aria-hidden="true"></div>

  <header class="topbar" id="topbar">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand brand fs-4" href="/" hx-boost="false">Progames</a>
        <button class="navbar-toggler border-0 ms-auto" type="button"
                data-bs-toggle="collapse" data-bs-target="#main-nav"
                aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="main-nav">
          <div class="navbar-nav ms-auto gap-2 mt-2 mt-lg-0">
            {{if .Authenticated}}
            <a class="btn btn-outline-light btn-sm" href="/practice" hx-get="/practice" hx-target="#app" hx-push-url="true">Practice</a>
            <form method="post" action="/api/logout" hx-post="/api/logout" hx-swap="none" class="d-inline">
              <input type="hidden" name="csrf_token" value="{{.CSRF}}">
              <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
            </form>
            {{else}}
            <a class="btn btn-outline-light btn-sm" href="/login" hx-get="/login" hx-target="#app" hx-push-url="true">Login</a>
            <a class="btn btn-primary btn-sm" href="/signup" hx-get="/signup" hx-target="#app" hx-push-url="true">Sign up</a>
            {{end}}
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div id="app">
      {{.Content}}
    </div>
  </main>

  <script>
    (function () {
      // Allow HTMX to swap 422 responses so server-rendered form errors are displayed.
      // Guard on Content-Type so non-HTML 422s (e.g. future JSON API errors) are not injected.
      document.body.addEventListener('htmx:beforeSwap', function (evt) {
        if (evt.detail.xhr.status === 422 &&
            (evt.detail.xhr.getResponseHeader('Content-Type') || '').includes('text/html')) {
          evt.detail.shouldSwap = true;
          evt.detail.isError = false;
        }
      });

      const topbar = document.getElementById('topbar');
      const onScroll = () => topbar.classList.toggle('scrolled', window.scrollY > 8);
      onScroll();
      window.addEventListener('scroll', onScroll, { passive: true });

      // Mouse-tracked aurora (parallax accent)
      const aurora = document.querySelector('.aurora-c');
      window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 80;
        const y = (e.clientY / window.innerHeight - 0.5) * 60;
        aurora.style.transform = 'translate(calc(-50% + ' + x + 'px), calc(-50% + ' + y + 'px))';
      }, { passive: true });

      // 3D tilt on .tilt elements
      function bindTilt(root) {
        root.querySelectorAll('.tilt').forEach((el) => {
          el.addEventListener('mousemove', (e) => {
            const r = el.getBoundingClientRect();
            const px = (e.clientX - r.left) / r.width - 0.5;
            const py = (e.clientY - r.top) / r.height - 0.5;
            el.style.transform = 'perspective(900px) rotateX(' + (-py*4).toFixed(2) + 'deg) rotateY(' + (px*6).toFixed(2) + 'deg)';
          });
          el.addEventListener('mouseleave', () => el.style.transform = '');
        });
      }
      bindTilt(document);
      document.body.addEventListener('htmx:afterSwap', (e) => bindTilt(e.target));

      // ===== Loading bar =====
      const bar = document.getElementById('loading-bar');
      let barTimer;
      document.body.addEventListener('htmx:beforeRequest', () => {
        clearTimeout(barTimer);
        bar.style.transition = 'width 300ms ease, opacity 0ms';
        bar.style.opacity = '1';
        bar.style.width = '40%';
        barTimer = setTimeout(() => { bar.style.width = '70%'; }, 300);
      });
      document.body.addEventListener('htmx:afterRequest', () => {
        clearTimeout(barTimer);
        bar.style.transition = 'width 200ms ease, opacity 350ms ease 200ms';
        bar.style.width = '100%';
        barTimer = setTimeout(() => {
          bar.style.opacity = '0';
          barTimer = setTimeout(() => { bar.style.transition = 'none'; bar.style.width = '0'; }, 360);
        }, 200);
      });

      // ===== Toast system =====
      // Server-side: send HX-Trigger: {"toast":{"message":"Saved","type":"success"}}
      // Client-side: call window.showToast("message", "success"|"error"|"warn")
      const toastRoot = document.getElementById('toast-root');
      const toastIcons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warn: 'bi-exclamation-triangle-fill' };

      window.showToast = function (message, type) {
        type = type || 'success';
        const el = document.createElement('div');
        el.className = 'app-toast toast-' + type;
        el.innerHTML = '<i class="bi ' + (toastIcons[type] || toastIcons.success) + ' toast-icon"></i><span>' + message + '</span>';
        toastRoot.appendChild(el);
        setTimeout(() => {
          el.classList.add('toast-out');
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }, 3800);
      };

      document.body.addEventListener('htmx:afterRequest', (evt) => {
        const trigger = evt.detail.xhr.getResponseHeader('HX-Trigger');
        if (!trigger) return;
        try {
          const data = JSON.parse(trigger);
          if (data.toast) window.showToast(data.toast.message, data.toast.type);
        } catch (_) {}
      });

      // Close mobile nav on HTMX navigation
      document.body.addEventListener('htmx:beforeRequest', () => {
        const nav = document.getElementById('main-nav');
        if (nav && nav.classList.contains('show') && window.bootstrap) {
          window.bootstrap.Collapse.getInstance(nav)?.hide();
        }
      });
    })();
  </script>
</body>
</html>
